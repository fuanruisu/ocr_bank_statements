name: plata_mobile
input_type: image_mobile
mode: multiline_after_date_with_secondary_category

defaults:
  cuenta: plata
  moneda: USD

patterns:
  date: '(?i)^\d{1,2}\s+de\s+\w+$'
  primary_amount: '[-–]?\$?\d[\d,]*\.\d{2}|[-–]?USD\s*\d[\d,]*\.\d{2}|[-–]?\d[\d,]*\.\d{2}'
  secondary_amount: '[+]\$?\d[\d,]*\.\d{2}'

ignore_lines:
  - '^Compra de acciones$'

ignore_contains:
  - '=== PAGE'

description_cleanup:
  remove_prefixes:
    - '^\([A-Za-z]\)\s*'
    - '^@\s*'
  normalize_whitespace: true

category_rules:
  - match: '(?i)^Viajes'
    value: 'Viajes'
  - match: '(?i)Compra de acciones'
    value: 'Inversión'

ocr_fixes:
  suspicious_leading_8_without_dollar: true

output_columns:
  - fecha
  - categoria
  - monto
  - descripcion
  - tarjeta_cuenta
  - tipo
